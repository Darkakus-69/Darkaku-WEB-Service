<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Darkaku WEB Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #0f0f0f, #000000);
  color: #00ffcc;
  font-family: 'Courier New', monospace;
  margin: 0;
  overflow-x: hidden;
}

/* HEADER */
.cabeza {
  text-align: center;
  padding: 25px;
  border-bottom: 1px solid #00ffcc;
  text-shadow: 0 0 10px #00ffcc;
}

h1 {
  margin: 0;
  font-size: 28px;
}

/* TITULOS */
h2 {
  padding-left: 20px;
  text-shadow: 0 0 5px #00ffcc;
}

/* GRID */
.malla {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* ICONOS */
.item {
  text-align: center;
}

.item img {
  width: 60px;
  transition: 0.3s;
  filter: drop-shadow(0 0 3px #00ffcc);
}

.item img:hover {
  transform: scale(1.2);
  filter: drop-shadow(0 0 10px #00ffcc);
}

/* TEXTO ICONOS */
.item span {
  display: block;
  font-size: 11px;
  margin-top: 5px;
}

/* FOOTER */
.pie {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #00ffcc;
  text-shadow: 0 0 5px #00ffcc;
}

/* EFECTO MATRIX SUAVE */
.matrix {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.05;
  font-size: 14px;
  color: #00ffcc;
  white-space: pre;
}
</style>

</head>

<body>

<div class="matrix" id="matrix"></div>
