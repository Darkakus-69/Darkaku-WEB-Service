<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Darkaku WEB Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background-color: #0f0f0f;
      color: #00ffcc;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
    }

    a:hover {
      color: #ffffff;
    }

    .cabeza {
      text-align: center;
      padding: 20px;
      border-bottom: 1px solid #00ffcc;
    }

    .malla {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .item img {
      width: 100%;
      border-radius: 10px;
      transition: 0.3s;
    }

    .item img:hover {
      transform: scale(1.1);
      border: 1px solid #00ffcc;
    }

    .pie {
      text-align: center;
      padding: 20px;
      border-top: 1px solid #00ffcc;
    }
  </style>
</head>

<body>

  <header class="cabeza">
    <h1>🐞 DARKAKU WEB SERVICE</h1>
  </header>

  <div class="malla">

    <div class="item"><a href="https://www.google.com"><img src="https://www.google.com/favicon.ico"></a></div>
