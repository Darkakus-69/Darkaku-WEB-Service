<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Darkaku WEB Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: radial-gradient(circle at top, #0f0f0f, #000);
  color: #00ffcc;
  font-family: 'Courier New', monospace;
  margin: 0;
}

.cabeza {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #00ffcc;
  text-shadow: 0 0 8px #00ffcc;
}

h2 {
  padding-left: 20px;
  text-shadow: 0 0 5px #00ffcc;
}

.busqueda {
  text-align: center;
  padding: 15px;
}

.busqueda input {
  padding: 10px;
  width: 80%;
  max-width: 400px;
  border: 1px solid #00ffcc;
  background: #000;
  color: #00ffcc;
}

.malla {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 15px;
  padding: 20px;
}

.item {
  text-align: center;
}

.item img {
  width: 55px;
  transition: 0.3s;
  filter: drop-shadow(0 0 4px #00ffcc);
}

.item img:hover {
  transform: scale(1.2);
  filter: drop-shadow(0 0 12px #00ffcc);
}

.item span {
  display: block;
  font-size: 11px;
  margin-top: 5px;
}

.pie {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #00ffcc;
}
</style>
</head>

<body>

<header class="cabeza">
  <h1>🐞 DARKAKU WEB SERVICE</h1>
</header>

<!-- BUSCADOR -->
<div class="busqueda">
  <input type="text" id="buscador" placeholder="Buscar sitio..." onkeyup="buscar()">
</div>

<!-- IA -->
<h2>🤖 IA</h2>
<div class="malla">

  <div class="item"><a href="https://gemini.google.com" target="_blank"><div style="font-size:35px;">🤖</div><span>Gemini</span></a></div>
  <div class="item"><a href="https://claude.ai" target="_blank"><div style="font-size:35px;">🧠</div><span>Claude</span></a></div>
</div>

<!-- REDES -->

  <div class="item"><a href="https://instagram.com" target="_blank"><div style="font-size:35px;">📸</div><span>Instagram</span></a></div>
  <div class="item"><a href="https://facebook.com" target="_blank"><div style="font-size:35px;">📘</div><span>Facebook</span></a></div>
  <div class="item"><a href="https://x.com" target="_blank"><div style="font-size:35px;">𝕏</div><span>X</span></a></div>
  <div class="item"><a href="https://web.whatsapp.com" target="_blank"><div style="font-size:35px;">💬</div><span>WhatsApp</span></a></div>
</div>

<!-- BANCOS -->
<h2>🏦 Bancos</h2>
<div class="malla">
  <div class="item"><a href="https://bancoestado.cl" target="_blank"><div style="font-size:35px;">🏦</div><span>Estado</span></a></div>
  <div class="item"><a href="https://bancochile.cl" target="_blank"><div style="font-size:35px;">🏦</div><span>Chile</span></a></div>
  <div class="item"><a href="https://santander.cl" target="_blank"><div style="font-size:35px;">🏦</div><span>Santander</span></a></div>

<!-- VIAJES -->
<h2>✈️ Viajes</h2>
<div class="malla">
  <div class="item"><a href="https://www.google.com/travel/flights" target="_blank"><div style="font-size:35px;">✈️</div><span>Vuelos</span></a></div>

<footer class="pie">
  ⚡ Darkaku Portal - Chile ⚡
</footer>

<!-- BUSCADOR SCRIPT -->
<script>
function buscar() {
  let input = document.getElementById("buscador").value.toLowerCase();
  let items = document.getElementsByClassName("item");

  for (let i = 0; i < items.length; i++) {
    let texto = items[i].innerText.toLowerCase();
    items[i].style.display = texto.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
