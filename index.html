<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Darkaku WEB Service</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FUENTE FUTURISTA -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>

/* FONDO CON LOGO */
body {
  margin: 0;
  font-family: 'Orbitron', monospace;
  color: #00ffcc;

  background-image: url("darkaku.png");
  background-size: 100%;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

/* CAPA OSCURA */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75); /* ajusta 0.6 - 0.85 */
  z-index: -1;
}

/* HEADER */
.cabeza {
  text-align: center;
  padding: 20px;
}

/* TITULO PRO */
.titulo {
  font-size: 32px;
  letter-spacing: 3px;
  color: #00ffcc;

  text-shadow:
    0 0 5px #00ffcc,
    0 0 10px #00ffcc,
    0 0 20px #00ffcc,
    0 0 40px #00ffaa;

  animation: brillo 2s infinite alternate;
}

@keyframes brillo {
  from {
    text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc;
  }
  to {
    text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffaa;
  }
}

/* SECCIONES */
h2 {
  padding-left: 20px;
  text-shadow: 0 0 5px #00ffcc;
}

/* BUSCADOR */
.busqueda {
  text-align: center;
  padding: 10px;
}

.busqueda input {
  padding: 10px;
  width: 80%;
  max-width: 400px;
  border: 1px solid #00ffcc;
  background: #000;
  color: #00ffcc;
}

/* GRID */
.malla {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 15px;
  padding: 20px;
}

.item {
  text-align: center;
}

.item img {
  width: 50px;
  filter: drop-shadow(0 0 5px #00ffcc);
  transition: 0.3s;
}

.item img:hover {
  transform: scale(1.2);
}

.item span {
  display: block;
  font-size: 11px;
}

/* FOOTER */
.pie {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #00ffcc;
}

</style>
</head>

<body>

<header class="cabeza">
  <h1 class="titulo">DARKAKU WEB SERVICE</h1>
</header>

<!-- BUSCADOR GOOGLE -->
<div class="busqueda">
  <form action="https://www.google.com/search" method="GET" target="_blank">
    <input type="text" name="q" placeholder="Buscar en Google...">
  </form>
</div>

<!-- BUSCADOR INTERNO -->
<div class="busqueda">
  <input type="text" id="buscador" placeholder="Buscar dentro del portal..." onkeyup="buscar()">
</div>

<!-- TIENDAS -->
<h2>🛒 Tiendas</h2>
<div class="malla">
  <div class="item"><a href="https://mercadolibre.cl"><span>MercadoLibre</span></a></div>
  <div class="item"><a href="https://falabella.cl"><span>Falabella</span></a></div>
  <div class="item"><a href="https://ripley.cl"><span>Ripley</span></a></div>
  <div class="item"><a href="https://paris.cl"><span>Paris</span></a></div>
</div>

<!-- IA -->
<h2>🤖 IA</h2>
<div class="malla">
  <div class="item"><a href="https://chatgpt.com"><span>🤍 ChatGPT</span></a></div>
  <div class="item"><a href="https://gemini.google.com"><span>🤖 Gemini</span></a></div>
  <div class="item"><a href="https://claude.ai"><span>🧠 Claude</span></a></div>
</div>

<!-- REDES -->
<h2>🌐 Redes</h2>
<div class="malla">
  <div class="item"><a href="https://instagram.com"><span>Instagram</span></a></div>
  <div class="item"><a href="https://facebook.com"><span>Facebook</span></a></div>
  <div class="item"><a href="https://x.com"><span>X</span></a></div>
  <div class="item"><a href="https://web.whatsapp.com"><span>WhatsApp</span></a></div>
</div>

<!-- BANCOS -->
<h2>🏦 Bancos</h2>
<div class="malla">
  <div class="item"><a href="https://www.bancoestado.cl" target="_blank"><span>Estado</span></a></div>
  <div class="item"><a href="https://bancochile.cl"><span>Chile</span></a></div>
  <div class="item"><a href="https://banco.santander.cl" target="_blank"><span>Santander</span></a></div>
  <div class="item"><a href="https://bci.cl"><span>BCI</span></a></div>
</div>

<!-- VIAJES -->
<h2>✈️ Viajes</h2>
<div class="malla">
  <div class="item"><a href="https://www.google.com/travel/flights"><span>Vuelos</span></a></div>
  <div class="item"><a href="https://www.latamairlines.com"><span>LATAM</span></a></div>
  <div class="item"><a href="https://www.booking.com"><span>Booking</span></a></div>
</div>

<!-- SERVICIOS -->
<h2>💸 Servicios</h2>
<div class="malla">
  <div class="item"><a href="https://www.servipag.com"><span>Servipag</span></a></div>
  <div class="item"><a href="https://www.correos.cl"><span>Correos</span></a></div>
</div>

<footer class="pie">
  ⚡ Darkaku Portal ⚡
</footer>

<!-- BUSCADOR SCRIPT -->
<script>
function buscar() {
  let input = document.getElementById("buscador").value.toLowerCase();
  let items = document.getElementsByClassName("item");

  for (let i = 0; i < items.length; i++) {
    let texto = items[i].innerText.toLowerCase();
    items[i].style.display = texto.includes(input) ? "" : "none";
  }
}
</script>

</body>
</html>
